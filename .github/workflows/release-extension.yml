name: Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Read extension version
        id: version
        run: >
          node -e "const fs = require('node:fs');
          const version = require('./packages/vsc-extension/package.json').version;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'value=' + version + '\n');"

      - name: Check whether the version tag already exists
        id: tag_check
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build extension
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter agms2-vsc-extension build

      - name: Package VSIX
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter agms2-vsc-extension package:vsix

      - name: Publish GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: packages/vsc-extension/agms2-vsc-extension-${{ steps.version.outputs.value }}.vsix
